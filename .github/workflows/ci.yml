name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 api worker

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run eslint
        run: |
          cd frontend
          npx eslint .

      - name: Run hadolint
        run: |
          docker run --rm -i hadolint/hadolint hadolint -t error - < api/Dockerfile
          docker run --rm -i hadolint/hadolint hadolint -t error - < worker/Dockerfile
          docker run --rm -i hadolint/hadolint hadolint -t error - < frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint


    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt

      - name: Run tests
        run: |
          export PYTHONPATH=.
          pytest

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and tag images
        run: |
          IMAGE_TAG=${{ github.sha }}

          # API
          docker build -t localhost:5000/api:$IMAGE_TAG -t localhost:5000/api:latest ./api

          # Worker
          docker build -t localhost:5000/worker:$IMAGE_TAG -t localhost:5000/worker:latest ./worker

          # Frontend
          docker build -t localhost:5000/frontend:$IMAGE_TAG -t localhost:5000/frontend:latest ./frontend

      - name: Push images to local registry
        run: |
          IMAGE_TAG=${{ github.sha }}

          docker push localhost:5000/api:$IMAGE_TAG
          docker push localhost:5000/api:latest

          docker push localhost:5000/worker:$IMAGE_TAG
          docker push localhost:5000/worker:latest

          docker push localhost:5000/frontend:$IMAGE_TAG
          docker push localhost:5000/frontend:latest


  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images again
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan API image
        run: trivy image --exit-code 1 --severity CRITICAL api:latest

      - name: Scan Worker image
        run: trivy image --exit-code 1 --severity CRITICAL worker:latest

      - name: Scan Frontend image
        run: trivy image --exit-code 1 --severity CRITICAL frontend:latest
