version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - app-network

  api:
    build: ./api
    container_name: api
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - app-network
    ports:
      - "8000:8000"

  worker:
    build: ./worker
    container_name: worker
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - app-network
    ports:
      - "3000:3000"

networks:
  app-network:
